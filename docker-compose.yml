services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@db:5432/procureintel
      JWT_SECRET: replace-me
    depends_on:
      - db
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: procureintel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  pgdata:
