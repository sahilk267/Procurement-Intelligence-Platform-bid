openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Procurement Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: tenants
    description: Tenant management
  - name: tenders
    description: Tender discovery and management
  - name: analysis
    description: AI tender analysis
  - name: eligibility
    description: Eligibility engine
  - name: proposals
    description: Proposal generation
  - name: workflow
    description: Bid workflow management
  - name: boq
    description: BOQ and price intelligence
  - name: documents
    description: Document vault
  - name: knowledge
    description: Knowledge base
  - name: analytics
    description: Analytics and insights
  - name: calendar
    description: Bid calendar
  - name: competitors
    description: Competitor intelligence
  - name: amendments
    description: Amendment tracker
  - name: clarifications
    description: Clarification management
  - name: vendors
    description: Vendor and OEM CRM

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── TENDERS ──────────────────────────────────────────────────────────────────
  /tenders:
    get:
      operationId: listTenders
      tags: [tenders]
      summary: List and search tenders
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Keyword search
        - name: category
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, awarded, cancelled]
        - name: minValue
          in: query
          schema:
            type: number
        - name: maxValue
          in: query
          schema:
            type: number
        - name: source
          in: query
          schema:
            type: string
            enum: [gem, cppp, state, psu, railway, defence, municipal, private]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of tenders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderListResponse"

    post:
      operationId: createTender
      tags: [tenders]
      summary: Manually add a tender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenderRequest"
      responses:
        "201":
          description: Tender created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tender"

  /tenders/{id}:
    get:
      operationId: getTender
      tags: [tenders]
      summary: Get tender details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tender detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderDetail"
        "404":
          description: Not found

    put:
      operationId: updateTender
      tags: [tenders]
      summary: Update tender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenderRequest"
      responses:
        "200":
          description: Updated tender
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tender"

    delete:
      operationId: deleteTender
      tags: [tenders]
      summary: Delete tender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tenders/{id}/track:
    post:
      operationId: trackTender
      tags: [tenders]
      summary: Add tender to tracked bids
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tracked

  # ── ANALYSIS ─────────────────────────────────────────────────────────────────
  /analysis/{tenderId}:
    get:
      operationId: getTenderAnalysis
      tags: [analysis]
      summary: Get AI analysis for a tender
      parameters:
        - name: tenderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderAnalysis"

    post:
      operationId: runTenderAnalysis
      tags: [analysis]
      summary: Trigger AI analysis for a tender
      parameters:
        - name: tenderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderAnalysis"

  /analysis/{tenderId}/go-no-go:
    get:
      operationId: getGoNoGo
      tags: [analysis]
      summary: Get Go/No-Go decision for tender
      parameters:
        - name: tenderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Go/No-Go result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoNoGoResult"

  # ── ELIGIBILITY ───────────────────────────────────────────────────────────────
  /eligibility/company-profile:
    get:
      operationId: getCompanyProfile
      tags: [eligibility]
      summary: Get company profile for eligibility matching
      responses:
        "200":
          description: Company profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"

    put:
      operationId: updateCompanyProfile
      tags: [eligibility]
      summary: Update company profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyProfile"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"

  /eligibility/check/{tenderId}:
    get:
      operationId: checkEligibility
      tags: [eligibility]
      summary: Check eligibility for a specific tender
      parameters:
        - name: tenderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Eligibility result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResult"

  # ── BID WORKFLOW ──────────────────────────────────────────────────────────────
  /bids:
    get:
      operationId: listBids
      tags: [workflow]
      summary: List all tracked bids / bid pipeline
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [shortlisted, in_progress, submitted, won, lost, dropped]
      responses:
        "200":
          description: List of bids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidListResponse"

    post:
      operationId: createBid
      tags: [workflow]
      summary: Create a bid entry for a tender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBidRequest"
      responses:
        "201":
          description: Bid created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

  /bids/{id}:
    get:
      operationId: getBid
      tags: [workflow]
      summary: Get bid details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bid detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

    put:
      operationId: updateBid
      tags: [workflow]
      summary: Update bid (stage, notes, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBidRequest"
      responses:
        "200":
          description: Updated bid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

  /bids/{id}/tasks:
    get:
      operationId: getBidTasks
      tags: [workflow]
      summary: Get tasks for a bid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BidTask"

    post:
      operationId: createBidTask
      tags: [workflow]
      summary: Create a task for a bid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBidTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidTask"

  # ── PROPOSALS ─────────────────────────────────────────────────────────────────
  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List proposals
      parameters:
        - name: bidId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Proposals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"

    post:
      operationId: createProposal
      tags: [proposals]
      summary: Generate or create a proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalRequest"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get proposal detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

    put:
      operationId: updateProposal
      tags: [proposals]
      summary: Update proposal content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposalRequest"
      responses:
        "200":
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  # ── BOQ ───────────────────────────────────────────────────────────────────────
  /boq:
    get:
      operationId: listBoq
      tags: [boq]
      summary: List BOQ entries
      parameters:
        - name: bidId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: BOQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoqItem"

    post:
      operationId: createBoqItem
      tags: [boq]
      summary: Add BOQ line item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoqItemRequest"
      responses:
        "201":
          description: BOQ item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoqItem"

  /boq/{id}:
    put:
      operationId: updateBoqItem
      tags: [boq]
      summary: Update BOQ line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoqItemRequest"
      responses:
        "200":
          description: Updated BOQ item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoqItem"

    delete:
      operationId: deleteBoqItem
      tags: [boq]
      summary: Delete BOQ item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DOCUMENTS ─────────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents in vault
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── KNOWLEDGE BASE ────────────────────────────────────────────────────────────
  /knowledge:
    get:
      operationId: listKnowledgeItems
      tags: [knowledge]
      summary: List knowledge base items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Knowledge items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeItem"

    post:
      operationId: createKnowledgeItem
      tags: [knowledge]
      summary: Add knowledge base item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeItem"

  /knowledge/{id}:
    put:
      operationId: updateKnowledgeItem
      tags: [knowledge]
      summary: Update knowledge item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeItemRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeItem"

    delete:
      operationId: deleteKnowledgeItem
      tags: [knowledge]
      summary: Delete knowledge item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ANALYTICS ─────────────────────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get dashboard statistics summary
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/bid-pipeline:
    get:
      operationId: getBidPipelineSummary
      tags: [analytics]
      summary: Get bid pipeline breakdown by stage
      responses:
        "200":
          description: Pipeline summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidPipelineSummary"

  /analytics/tender-trends:
    get:
      operationId: getTenderTrends
      tags: [analytics]
      summary: Get tender discovery trends over time
      responses:
        "200":
          description: Trends data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderTrends"

  /analytics/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── CALENDAR ─────────────────────────────────────────────────────────────────
  /calendar/events:
    get:
      operationId: listCalendarEvents
      tags: [calendar]
      summary: List bid calendar events
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /calendar/upcoming:
    get:
      operationId: getUpcomingDeadlines
      tags: [calendar]
      summary: Get upcoming deadlines
      responses:
        "200":
          description: Upcoming deadlines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  # ── COMPETITORS ───────────────────────────────────────────────────────────────
  /competitors:
    get:
      operationId: listCompetitors
      tags: [competitors]
      summary: List competitor intelligence records
      responses:
        "200":
          description: Competitor records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompetitorRecord"

    post:
      operationId: createCompetitorRecord
      tags: [competitors]
      summary: Add competitor intelligence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetitorRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorRecord"

  # ── AMENDMENTS ───────────────────────────────────────────────────────────────
  /amendments/{tenderId}:
    get:
      operationId: listAmendments
      tags: [amendments]
      summary: List amendments for a tender
      parameters:
        - name: tenderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Amendment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Amendment"

  # ── CLARIFICATIONS ────────────────────────────────────────────────────────────
  /clarifications:
    get:
      operationId: listClarifications
      tags: [clarifications]
      summary: List clarification queries
      parameters:
        - name: bidId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, submitted, replied]
      responses:
        "200":
          description: Clarifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clarification"

    post:
      operationId: createClarification
      tags: [clarifications]
      summary: Create a clarification question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClarificationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clarification"

  /clarifications/{id}:
    put:
      operationId: updateClarification
      tags: [clarifications]
      summary: Update clarification status/reply
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClarificationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clarification"

  # ── VENDORS ───────────────────────────────────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors and OEM contacts
      responses:
        "200":
          description: Vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

    post:
      operationId: createVendor
      tags: [vendors]
      summary: Add vendor/OEM contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    put:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        companyName:
          type: string
      required: [email, password, name]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
